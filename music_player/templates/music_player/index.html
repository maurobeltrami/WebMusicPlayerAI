{% load static %}
<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mauro Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Wet+Paint&family=Special+Elite&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'music_player/style.css' %}">
</head>

<body
    class="bg-[#1a1a1a] min-h-screen p-2 md:p-4 flex items-start justify-center font-['Special_Elite'] text-black overflow-x-hidden selection:bg-[#D00] selection:text-white bg-[url('https://www.transparenttextures.com/patterns/asfalt-dark.png')]">


    <div class="max-w-6xl w-full relative z-10">

        <!-- Safety pins or tape can go here -->

        <div class="stencil-box p-4 md:p-8">

            <header
                class="mb-12 flex flex-col md:flex-row justify-between items-center border-b-[3px] border-black pb-8 gap-4">
                <h1
                    class="text-4xl md:text-6xl lg:text-7xl graffiti-title tracking-tight text-black transform rotate-[-2deg] text-center md:text-left">
                    <span class="text-6xl md:text-8xl lg:text-9xl text-[#D00]">M</span>AURO<span
                        class="text-6xl md:text-8xl lg:text-9xl text-[#D00]">M</span>USIC
                </h1>
                <!-- Original Touch: Stylized decorative line or simple spacer instead of album title -->
                <div
                    class="h-2 w-full max-w-[200px] bg-[#D00] transform skew-x-12 opacity-80 mt-2 md:mt-0 hidden md:block">
                </div>
            </header>

            <main class="grid lg:grid-cols-12 gap-6 lg:gap-12">
                <aside class="lg:col-span-4 p-4 leopard-bg transform rotate-1 relative z-20">
                    <div
                        class="absolute -top-3 -left-3 bg-acid-pink text-white px-3 py-1 font-bold text-lg rotate-[-5deg] border border-black shadow-[2px_2px_0px_black] font-['Rubik_Wet_Paint']">
                        TRAX</div>

                    <h2 class="text-2xl font-black mb-4 uppercase border-b-2 border-black inline-block px-1">Libreria
                    </h2>

                    <!-- Folder Navigation -->
                    <div class="mb-6 p-2 bg-white border border-black">
                        <label
                            class="block text-sm font-bold uppercase mb-1 bg-acid-blue text-black inline-block px-1 transform -rotate-1 border border-black">Cartelle</label>
                        <div class="flex items-center gap-2 mb-2 p-1 border-b-2 border-black">
                            <button id="dirUpBtn"
                                class="bg-black text-white hover:bg-acid-green hover:text-black px-2 font-bold text-xl transition-colors"><i
                                    class="fas fa-arrow-up"></i></button>
                            <span id="currentDirDisplay"
                                class="truncate font-['Special_Elite'] text-gray-900 text-xs flex-1">/</span>
                        </div>
                        <div id="dirList"
                            class="max-h-32 overflow-y-auto space-y-1 custom-scrollbar font-['Special_Elite']">
                            <!-- JS populated -->
                        </div>
                    </div>

                    <div class="mb-6 border-4 border-black p-2 bg-white">
                        <label
                            class="block text-sm font-bold uppercase mb-1 bg-acid-green text-black inline-block px-1 transform rotate-1 border border-black">Playlist</label>
                        <select id="savedPlaylistSelector"
                            class="w-full p-2 border-2 border-black bg-white font-bold text-sm outline-none focus:bg-acid-pink focus:text-white focus:ring-0 font-['Special_Elite']">
                            <option value="all">Tutta la Libreria</option>
                        </select>
                    </div>
                    <div class="mb-6 p-2 bg-white border-2 border-dashed border-black">
                        <input type="text" id="searchTrackInput" placeholder="CERCA BRANO..."
                            class="w-full p-2 border-b-2 border-black bg-transparent uppercase font-bold placeholder-gray-500 focus:outline-none font-['Special_Elite'] focus:bg-acid-blue">
                    </div>
                    <div class="mb-4">
                        <label
                            class="block text-sm font-bold uppercase mb-1 text-black bg-acid-green inline-block px-1 border border-black transform -rotate-1">Artista</label>
                        <select id="artistFilter"
                            class="w-full p-2 border-2 border-black rounded-none bg-gray-100 font-['Special_Elite']"></select>
                    </div>
                    <div class="mb-4">
                        <label
                            class="block text-sm font-bold uppercase mb-1 text-white bg-acid-pink inline-block px-1 border border-black transform rotate-1">Album</label>
                        <select id="albumFilter"
                            class="w-full p-2 border-2 border-black rounded-none bg-gray-100 font-['Special_Elite']"></select>
                    </div>
                </aside>

                <section class="lg:col-span-8 p-4 stencil-box relative border-acid-green">
                    <!-- Decorative Sticker -->
                    <div class="absolute -top-5 -right-5 transform rotate-12 z-20">
                        <img src="https://img.icons8.com/stencil/96/FA5252/punk.png" alt="Punk"
                            class="w-24 opacity-90 drop-shadow-md">
                    </div>

                    <div id="displayScreen"
                        class="w-full p-4 bg-[#eee] border-2 border-black mb-6 flex flex-col items-center justify-center relative shadow-[inset_0_0_40px_rgba(0,0,0,0.2)] bg-[url('https://www.transparenttextures.com/patterns/concrete-wall.png')] min-h-[300px] md:min-h-[480px]">
                        <div class="w-full px-4 mb-4 overflow-hidden">
                            <p id="currentTrack"
                                class="text-center graffiti-title text-2xl md:text-4xl transform skew-x-[-5deg] drop-shadow-sm break-words">
                                NO MUSIC SELECTED</p>
                        </div>
                        <div class="w-full px-4 mb-2">
                            <div id="progressControl"
                                class="w-full h-8 bg-black border-2 border-black cursor-pointer relative group">
                                <div id="progressBar" class="h-full bg-acid-pink pointer-events-none opacity-100"
                                    style="width: 0%;"></div>
                            </div>
                        </div>
                        <div id="time-display"
                            class="font-['Special_Elite'] font-bold bg-white border border-black px-2 mt-2 inline-block shadow-[2px_2px_0px_black]">
                            0:00</div>

                        <div id="visualizerContainer"
                            class="w-full h-48 md:h-80 bg-black border-4 border-acid-blue outline outline-1 outline-black flex items-center justify-center relative overflow-hidden mt-4">
                            <canvas id="visualizer" class="block w-full h-full opacity-80"></canvas>
                        </div>

                        <div class="mt-3">
                            <select id="visualizerSelector"
                                class="p-1 text-sm font-bold bg-white text-black border-2 border-black rounded-none uppercase hover:bg-[#D00] hover:text-white focus:outline-none mt-2 font-['Special_Elite']">
                                <option value="cover">Copertina</option>
                                <option value="waveform">Waveform</option>
                                <option value="bars">Bars</option>
                                <option value="circles">Rings</option>
                                <option value="none">Off</option>
                            </select>
                        </div>

                        <div
                            class="w-full mt-4 px-4 py-2 bg-black/30 rounded-lg border border-white/10 grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[8px] text-gray-400 block uppercase">Threshold: <span
                                        id="thresholdVal">-24</span>dB</label>
                                <input type="range" id="thresholdSlider" min="-60" max="0" value="-24"
                                    class="w-full h-1">
                            </div>
                            <div>
                                <label class="text-[8px] text-gray-400 block uppercase">Ratio: <span
                                        id="ratioVal">12</span>:1</label>
                                <input type="range" id="ratioSlider" min="1" max="20" value="12" class="w-full h-1">
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-center w-full mt-4">
                        <div
                            class="flex flex-col items-center justify-center mr-4 md:mr-8 relative w-8 h-32 bg-transparent">
                            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.75"
                                class="accent-acid-green cursor-pointer h-6 w-32 appearance-none bg-transparent rotate-[-90deg]">
                        </div>
                        <div
                            class="relative w-40 h-40 md:w-48 md:h-48 bg-white border-4 border-black rounded-full flex items-center justify-center shadow-[0px_0px_0px_4px_black] overflow-hidden">
                            <!-- Spiral/Hypnotic Center for Ska feel -->
                            <div
                                class="absolute inset-0 bg-[repeating-conic-gradient(black_0deg_10deg,white_10deg_20deg)] opacity-10 pointer-events-none">
                            </div>
                            <button id="shuffleBtn" class="absolute top-4 text-black hover:text-[#D00]"><i
                                    class="fas fa-random fa-lg"></i></button>
                            <button id="prevBtn" class="absolute left-4 text-black hover:text-[#D00]"><i
                                    class="fas fa-backward fa-lg"></i></button>
                            <button id="nextBtn" class="absolute right-4 text-black hover:text-[#D00]"><i
                                    class="fas fa-forward fa-lg"></i></button>
                            <button id="menuBtn" class="absolute bottom-4 text-black hover:text-[#D00]"><i
                                    class="fas fa-bars fa-lg"></i></button>

                            <button id="playPauseBtn"
                                class="w-16 h-16 md:w-20 md:h-20 bg-[#D00] border-4 border-white rounded-full flex items-center justify-center text-white shadow-lg hover:scale-110 transition-transform z-10">
                                <i id="playPauseIcon" class="fas fa-play fa-xl"></i>
                            </button>
                        </div>
                    </div>
                    <audio id="audioPlayer" crossorigin="anonymous"></audio>
                </section>
            </main>

            <section class="mt-8 border-t-4 border-black pt-6 bg-white p-4">
                <h2 class="text-3xl graffiti-title text-black mb-4">PLAYLIST QUEUE (<span id="playlistCount">0</span>)
                </h2>
                <ul id="playlist" class="space-y-2 max-h-80 overflow-y-auto custom-scrollbar font-['Special_Elite']">
                </ul>
            </section>
        </div>

        <div id="playlistModal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-2">
            <div class="stencil-box rounded-none w-full max-w-4xl max-h-[95vh] flex flex-col overflow-hidden">
                <div class="p-4 border-b-4 border-black flex justify-between items-center bg-[#D00]">
                    <h2 class="text-3xl graffiti-title text-white">MANAGE PLAYLIST</h2>
                    <button id="closeModal" class="text-white hover:text-black text-4xl font-bold">&times;</button>
                </div>
                <div class="flex-1 overflow-y-auto p-4 bg-white">
                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="flex flex-col h-[400px]">
                            <h3 class="mb-2 text-black font-black uppercase text-lg border-b-2 border-black">Libreria
                                Brani</h3>
                            <input type="text" id="modalSearchInput" placeholder="Cerca brano..."
                                class="w-full p-2 border-2 border-black rounded-none mb-2 font-['Special_Elite']">
                            <div id="trackSelectionList"
                                class="flex-1 overflow-y-auto border-2 border-black rounded-none bg-gray-50 p-2">
                            </div>
                        </div>
                        <div class="flex flex-col h-[300px]">
                            <h3 class="mb-2 text-black font-black uppercase text-lg border-b-2 border-black">Le tue
                                Playlist</h3>
                            <ul id="savedPlaylistsList" class="flex-1 overflow-y-auto space-y-2"></ul>
                        </div>
                    </div>
                </div>
                <div class="p-4 border-t-4 border-black bg-[#eee] flex flex-col gap-3">
                    <input type="text" id="playlistNameInput" placeholder="Nome nuova playlist..."
                        class="w-full p-3 border-2 border-black rounded-none font-['Special_Elite']">
                    <button id="savePlaylistBtn"
                        class="w-full bg-black text-white border-2 border-white py-4 font-black text-2xl uppercase tracking-widest hover:bg-[#D00] transition-colors font-['Rubik_Wet_Paint']">
                        SALVA TUTTO
                    </button>
                </div>
            </div>
        </div>

        <div id="trackPlaylistModal"
            class="fixed inset-0 bg-black/60 hidden z-[60] flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl">
                <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                    <h3 class="font-bold text-gray-800">Aggiungi a playlist</h3>
                    <button id="closeTrackModal" class="text-gray-400 hover:text-red-500 text-2xl">&times;</button>
                </div>
                <div id="trackPlaylistList" class="max-h-60 overflow-y-auto">
                </div>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
        <script type="module" src="{% static 'music_player/js/app.js' %}"></script>
</body>

</html>
